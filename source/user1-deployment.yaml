apiVersion: v1
kind: Namespace
metadata:
  name: namespace-user1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-user1-omniverse-viewer
  namespace: namespace-user1
  labels:
    app: deployment-user1-omniverse-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployment-user1-omniverse-viewer
  template:
    metadata:
      labels:
        app: deployment-user1-omniverse-viewer
    spec:
      hostNetwork: true
      containers:
        - name: container-user1-kit-app
          image: dineshkrish93/dk-public-repo:kit-app-editor-1-streaming
          imagePullPolicy: IfNotPresent
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "all"
            - name: NVDA_KIT_ARGS
              value: "--/exts/omni.kit.livestream.app/primaryStream/signalPort=49103 --/exts/omni.kit.livestream.app/primaryStream/streamPort=48001"
          resources:
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm

        - name: container-user1-web-viewer
          image: dineshkrish93/dk-public-repo:web-viewer-sample-1.5.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SIGNALING_PORT
              value: "49103"
            - name: WEB_PORT
              value: "8083"

      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: service-user1-omniverse-viewer
  namespace: namespace-user1
  labels:
    app: deployment-user1-omniverse-viewer
spec:
  type: NodePort
  selector:
    app: deployment-user1-omniverse-viewer
  ports:
    - name: web-viewer
      port: 80
      targetPort: 8083
